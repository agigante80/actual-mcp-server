version: 2
# Version-update PRs target develop (#265): main is fast-forward-only from
# develop, so a bot PR against main is structurally unmergeable. Residual lane:
# Dependabot SECURITY-update PRs ignore target-branch and always go to the
# default branch (a platform limitation); handle those via the merge-pr
# supersession flow or the npm audit gate, or disable security updates in repo
# settings if the noise recurs.
updates:
  # Enable version updates for npm
  # Note: @actual-app/api updates are handled by dependency-update.yml workflow
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    
    # Group updates for cleaner PR management (single group for all dependencies)
    groups:
      all-dependencies:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
        # Exclude @actual-app/api (handled by dedicated workflow)
        exclude-patterns:
          - "@actual-app/api"
      
      # Security updates always get separate PRs for immediate review
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
    
    # Ignore specific updates requiring manual review
    ignore:
      # @actual-app/api updates handled by dependency-update.yml workflow
      - dependency-name: "@actual-app/api"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
    
    # Labels for PR categorization
    labels:
      - "dependencies"
      - "automated"
    
    # Commit message conventions
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    
    # Assign reviewer
    reviewers:
      - "agigante80"
  
  # Monitor GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
  
  # Monitor Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
