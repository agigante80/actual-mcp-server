name: CI/CD Pipeline

# ============================================================================
# Trigger Configuration
# ============================================================================
on:
  push:
    branches: [main, develop, development]
    tags: ['v*']  # Trigger on version tags
  pull_request:
    branches: [main, develop, development]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (for emergency deployments)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      skip_docker_publish:
        description: 'Skip Docker publishing'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      docker_tag_suffix:
        description: 'Additional Docker tag suffix (optional)'
        required: false
        type: string
        default: ''

# ============================================================================
# Permissions
# ============================================================================
permissions:
  contents: write
  packages: write
  security-events: write

# ============================================================================
# Environment Variables
# ============================================================================
env:
  NODE_VERSION: '22'
  DOCKER_IMAGE_NAME: agigante80/actual-mcp-server
  DOCKER_PLATFORMS: 'linux/amd64,linux/arm64'
  REGISTRY: docker.io

# ============================================================================
# Jobs
# ============================================================================
jobs:
  # --------------------------------------------------------------------------
  # Job 1: Version Generation
  # --------------------------------------------------------------------------
  version:
    name: Version Generation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      docker_version: ${{ steps.version.outputs.docker_version }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📝 Extract version
        id: version
        run: |
          BASE_VERSION=$(cat VERSION | tr -d '\n')
          SHORT_SHA=$(git rev-parse --short HEAD)
          
          # Add development metadata for non-main branches
          if [[ "${{ github.ref }}" == "refs/heads/develop" ]] || [[ "${{ github.ref }}" == "refs/heads/development" ]]; then
            VERSION="${BASE_VERSION}-dev-${SHORT_SHA}"
            echo "🔨 This is a development build"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION="${BASE_VERSION}"
            echo "🚀 This is a stable release from main"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${BASE_VERSION}"
            echo "🏷️ This is a tagged release"
          else
            # Feature branches or other branches
            BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g')
            VERSION="${BASE_VERSION}-${BRANCH_NAME}-${SHORT_SHA}"
            echo "🌿 This is a feature branch build"
          fi
          
          # Docker doesn't allow + in tags, replace with -
          DOCKER_VERSION="${VERSION//+/-}"
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "docker_version=$DOCKER_VERSION" >> $GITHUB_OUTPUT
          echo "📦 Semver version: $VERSION"
          echo "🐳 Docker version: $DOCKER_VERSION"
          
          # Determine if this is a stable release (no pre-release metadata)
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: 📊 Display version info
        run: |
          echo "### 📦 Version Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Semver**: \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker**: \`${{ steps.version.outputs.docker_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Release**: ${{ steps.version.outputs.is_release }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------------------------------
  # Job 2: Lint & Type Check
  # --------------------------------------------------------------------------
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: version
    # Least privilege (#170): this job installs actionlint at runtime, so scope it
    # to read-only. Even if the download were compromised it cannot push to the
    # repo or packages (the top-level permissions grant write; the publish jobs
    # re-grant what they need).
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 TypeScript type check
        run: npm run build

      - name: 📊 Check tool coverage
        run: npm run check:coverage

      - name: 🩺 Lint GitHub Actions workflows (actionlint)
        run: |
          # Official installer, pinned to a specific actionlint version (avoids a
          # third-party action and keeps the version reviewable).
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash | bash -s 1.7.12
          # -shellcheck= disables actionlint's shellcheck integration (#180). Its
          # findings depend on the runner's shellcheck VERSION, so an exclusion
          # list passed locally but failed in CI (SC2002 on a different shellcheck).
          # actionlint's own checks (expression syntax, unknown contexts, invalid
          # needs, deprecated runner/action usage) still run and are deterministic,
          # which is the #153/#170 goal.
          ./actionlint -shellcheck= -color

      - name: 📋 Lint summary
        if: always()
        run: |
          echo "### ✅ Lint Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------------------------------
  # Job 3: Run Tests (Unit & Smoke)
  # --------------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: version
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 🔢 Enforce tool count (no drift in total-count literals)
        run: npm run tool-count

      - name: 🔐 Run npm audit
        run: |
          echo "Running npm audit..."
          npm audit --audit-level=high || echo "⚠️ Vulnerabilities found, but continuing..."

      - name: 🧪 Run unit smoke tests
        env:
          # Dummy credentials for smoke tests (don't connect to actual server)
          ACTUAL_SERVER_URL: http://localhost:5006
          ACTUAL_PASSWORD: dummy-password-for-tests
          ACTUAL_BUDGET_SYNC_ID: 00000000-0000-0000-0000-000000000000
        run: node tests/unit/generated_tools.smoke.test.js

      - name: 📋 Test summary
        if: always()
        run: |
          echo "### 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------------------------------
  # Job 3.5: Docker E2E Tests (Runs in Parallel with Lint & Test)
  # --------------------------------------------------------------------------
  docker-e2e:
    name: Docker E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: version
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      # Playwright browsers are NOT installed on the host — tests run inside the
      # mcr.microsoft.com/playwright:v1.57.0-jammy Docker container (e2e-test-runner
      # service in docker-compose.test.yaml) which already has Playwright pre-installed.

      - name: 🗄️ Restore Docker image cache
        id: docker-cache
        uses: actions/cache@v5
        with:
          path: /tmp/docker-image-cache
          key: docker-e2e-images-${{ runner.os }}-${{ hashFiles('docker-compose.test.yaml') }}
          restore-keys: docker-e2e-images-${{ runner.os }}-

      - name: 🐳 Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: |
          for f in /tmp/docker-image-cache/*.tar; do
            [ -f "$f" ] && docker load -i "$f" && echo "Loaded $f" || true
          done

      - name: 🧪 Run Docker E2E tests (FULL - 63 tests)
        run: npm run test:e2e:docker:full

      - name: 🐳 Save Docker images to cache
        if: always()
        run: |
          mkdir -p /tmp/docker-image-cache
          docker save actualbudget/actual-server:latest \
            -o /tmp/docker-image-cache/actual-server.tar 2>/dev/null || true
          docker save "mcr.microsoft.com/playwright:v1.57.0-jammy" \
            -o /tmp/docker-image-cache/playwright-jammy.tar 2>/dev/null || true

      - name: 🧹 Cleanup Docker containers
        if: always()
        run: docker compose -f docker-compose.test.yaml down -v

      - name: 📋 Docker E2E summary
        if: always()
        run: |
          echo "### 🐳 Docker E2E Test Results (Full Suite)" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests**: 63 (all 62 tools + error scenarios)" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------------------------------
  # Job 4: Validate Docker Hub Description
  # --------------------------------------------------------------------------
  validate-short-description:
    name: Validate Docker Description
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: version
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ✅ Validate short description length
        run: |
          chmod +x ./docker/validate-docker-desc.sh
          ./docker/validate-docker-desc.sh
          echo "✅ Docker Hub short description is valid (<= 100 characters)"

      - name: 📋 Validation summary
        if: always()
        run: |
          CHAR_COUNT=$(wc -c < docker/description/short.md | tr -d ' ')
          echo "### 📝 Docker Description Validation" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Character Count**: $CHAR_COUNT / 100" >> $GITHUB_STEP_SUMMARY
          echo "- **Remaining**: $((100 - CHAR_COUNT))" >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------------------------------
  # Job 5a: Build per-arch images on NATIVE runners (no QEMU), push by digest
  # --------------------------------------------------------------------------
  docker-build:
    name: Build ${{ matrix.platform }} image
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    needs: [version, lint, test, docker-e2e, validate-short-description]
    if: |
      always() &&
      needs.version.result == 'success' &&
      needs.lint.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.docker-e2e.result == 'success' || needs.docker-e2e.result == 'skipped') &&
      needs.validate-short-description.result == 'success' &&
      github.event.inputs.skip_docker_publish != 'true' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' ||
       github.ref == 'refs/heads/development' || startsWith(github.ref, 'refs/tags/'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🧮 Prepare per-arch vars
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
          DOCKER_HUB_IMAGE="${{ env.DOCKER_IMAGE_NAME }}"
          REPO_NAME="${DOCKER_HUB_IMAGE##*/}"
          echo "GHCR_IMAGE=ghcr.io/${{ github.repository_owner }}/${REPO_NAME}" >> "$GITHUB_ENV"

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build and push by digest (${{ matrix.platform }})
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
          outputs: |
            type=image,"name=${{ env.DOCKER_IMAGE_NAME }},${{ env.GHCR_IMAGE }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: |
            type=gha,scope=${{ github.ref_name }}-${{ env.PLATFORM_PAIR }}
            type=gha,scope=develop-${{ env.PLATFORM_PAIR }}
            type=gha,scope=main-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-${{ env.PLATFORM_PAIR }}
          labels: |
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}

      - name: 🧾 Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: ⬆️ Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # --------------------------------------------------------------------------
  # Job 5b: Merge per-arch digests into multi-arch manifests and publish tags.
  # Keeps the name "docker-publish" so every downstream needs.docker-publish
  # gate (npm-publish, security-scan, docker-hub-description, deployment-test,
  # release) keeps gating on the job that produces the published tags.
  # --------------------------------------------------------------------------
  docker-publish:
    name: Build & Publish Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [version, docker-build]
    if: always() && needs.version.result == 'success' && needs.docker-build.result == 'success'
    steps:
      - name: ⬇️ Download per-arch digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Generate Docker tags
        id: meta
        run: |
          DOCKER_VERSION="${{ needs.version.outputs.docker_version }}"
          DOCKER_HUB_IMAGE="${{ env.DOCKER_IMAGE_NAME }}"
          REPO_NAME="${DOCKER_HUB_IMAGE##*/}"
          GHCR_IMAGE="ghcr.io/${{ github.repository_owner }}/${REPO_NAME}"

          # Per-registry tag lists (bare tag refs). Kept separate so each
          # manifest is assembled from that registry's own pushed digests.
          HUB_TAGS="${DOCKER_HUB_IMAGE}:${DOCKER_VERSION}"
          GHCR_TAGS="${GHCR_IMAGE}:${DOCKER_VERSION}"

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            HUB_TAGS="${HUB_TAGS},${DOCKER_HUB_IMAGE}:main,${DOCKER_HUB_IMAGE}:latest"
            GHCR_TAGS="${GHCR_TAGS},${GHCR_IMAGE}:main,${GHCR_IMAGE}:latest"
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            HUB_TAGS="${HUB_TAGS},${DOCKER_HUB_IMAGE}:develop,${DOCKER_HUB_IMAGE}:development"
            GHCR_TAGS="${GHCR_TAGS},${GHCR_IMAGE}:develop,${GHCR_IMAGE}:development"
          elif [[ "${{ github.ref }}" == "refs/heads/development" ]]; then
            HUB_TAGS="${HUB_TAGS},${DOCKER_HUB_IMAGE}:development"
            GHCR_TAGS="${GHCR_TAGS},${GHCR_IMAGE}:development"
          fi

          # Add latest tag ONLY for tagged releases (e.g., v1.0.0)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            HUB_TAGS="${HUB_TAGS},${DOCKER_HUB_IMAGE}:latest"
            GHCR_TAGS="${GHCR_TAGS},${GHCR_IMAGE}:latest"
          fi

          # Add custom suffix if provided
          if [[ -n "${{ github.event.inputs.docker_tag_suffix }}" ]]; then
            SUFFIX="${{ github.event.inputs.docker_tag_suffix }}"
            HUB_TAGS="${HUB_TAGS},${DOCKER_HUB_IMAGE}:${DOCKER_VERSION}-${SUFFIX}"
            GHCR_TAGS="${GHCR_TAGS},${GHCR_IMAGE}:${DOCKER_VERSION}-${SUFFIX}"
          fi

          echo "hub_tags=${HUB_TAGS}" >> "$GITHUB_OUTPUT"
          echo "ghcr_tags=${GHCR_TAGS}" >> "$GITHUB_OUTPUT"
          echo "hub_image=${DOCKER_HUB_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "📦 Docker Hub tags: ${HUB_TAGS}"
          echo "📦 GHCR tags: ${GHCR_TAGS}"

      - name: 🧩 Create and push multi-arch manifests
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Each digest file is a single-arch image digest (sha256 hex, no
          # prefix), pushed by digest to BOTH registries by the build legs.
          # The matrix builds exactly two arches, so we must have exactly two
          # digests. Fail loudly rather than assemble a misleading single-arch
          # manifest from a partial download (nullglob keeps an empty dir from
          # turning the glob into a literal "*").
          digest_files=( * )
          if [[ ${#digest_files[@]} -ne 2 ]]; then
            echo "Expected 2 per-arch digests, found ${#digest_files[@]}: ${digest_files[*]:-<none>}" >&2
            exit 1
          fi

          hub_targets=()
          ghcr_targets=()
          IFS=',' read -ra _hub <<< "${{ steps.meta.outputs.hub_tags }}"
          IFS=',' read -ra _ghcr <<< "${{ steps.meta.outputs.ghcr_tags }}"
          for t in "${_hub[@]}"; do hub_targets+=( -t "$t" ); done
          for t in "${_ghcr[@]}"; do ghcr_targets+=( -t "$t" ); done

          hub_sources=()
          ghcr_sources=()
          for f in "${digest_files[@]}"; do
            hub_sources+=( "${{ steps.meta.outputs.hub_image }}@sha256:${f}" )
            ghcr_sources+=( "${{ steps.meta.outputs.ghcr_image }}@sha256:${f}" )
          done

          echo "Creating Docker Hub manifest from: ${hub_sources[*]}"
          docker buildx imagetools create "${hub_targets[@]}" "${hub_sources[@]}"

          echo "Creating GHCR manifest from: ${ghcr_sources[*]}"
          docker buildx imagetools create "${ghcr_targets[@]}" "${ghcr_sources[@]}"

      - name: 🔎 Inspect published manifest (assert both arches)
        run: |
          set -euo pipefail
          first_tag="${{ steps.meta.outputs.hub_tags }}"
          first_tag="${first_tag%%,*}"
          echo "Inspecting ${first_tag}"
          docker buildx imagetools inspect "${first_tag}"

      - name: 📋 Docker publish summary
        run: |
          echo "### 🐳 Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms**: \`${{ env.DOCKER_PLATFORMS }}\` (built natively, no QEMU)" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Hub tags**:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.hub_tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "- **GHCR tags**:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.ghcr_tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------------------------------
  # Job 6: Publish to npm (via Trusted Publishers — no NPM_TOKEN needed)
  # --------------------------------------------------------------------------
  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [version, docker-publish]
    # Tag-gated to prevent a double-publish race during releases: pushing a
    # tagged release fires both push:branches:[main] and push:tags:[v*] for the
    # same SHA, and both jobs would call npm publish for the same version. The
    # main-push job would lose the race and report failure. See #153.
    if: |
      needs.version.outputs.is_release == 'true' &&
      needs.docker-publish.result == 'success' &&
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # required for npm Trusted Publishers (OIDC)
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ⬆️ Upgrade npm (npm 11.5.1+ required for Trusted Publishers OIDC)
        run: npm install -g npm@latest

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 🚀 Publish to npm (Trusted Publishers / OIDC)
        run: npm publish --provenance --access public

      - name: 📋 npm publish summary
        run: |
          echo "### 📦 npm Package Published" >> $GITHUB_STEP_SUMMARY
          echo "- **Package**: \`actual-mcp-server\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: https://www.npmjs.com/package/actual-mcp-server" >> $GITHUB_STEP_SUMMARY
          echo "- **Provenance**: attached (OIDC, no long-lived token)" >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------------------------------
  # Job 8: Security Scanning
  # --------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [version, lint, test]
    if: |
      always() &&
      needs.version.result == 'success' &&
      needs.lint.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    permissions:
      contents: read
      security-events: write
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🏗️ Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.DOCKER_IMAGE_NAME }}:scan
          build-args: |
            VERSION=${{ needs.version.outputs.version }}

      - name: 🔍 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE_NAME }}:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: 📤 Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

      - name: 📋 Security scan summary
        if: always()
        run: |
          echo "### 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Scanner**: Trivy" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.DOCKER_IMAGE_NAME }}:scan\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Full results available in the Security tab" >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------------------------------
  # Job 9: Update Docker Hub Description
  # --------------------------------------------------------------------------
  docker-hub-description:
    name: Update Docker Hub Description
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [version, docker-publish]
    if: |
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) &&
      needs.docker-publish.result == 'success'
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📝 Read Docker descriptions
        id: get-desc
        run: |
          SHORT_DESC=$(cat docker/description/short.md)
          echo "short=${SHORT_DESC}" >> $GITHUB_OUTPUT
          echo "Short description: ${SHORT_DESC}"

      - name: 🐳 Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKER_IMAGE_NAME }}
          short-description: ${{ steps.get-desc.outputs.short }}
          readme-filepath: ./docker/description/long.md

      - name: 📋 Docker Hub update summary
        run: |
          echo "### 🐳 Docker Hub Description Updated" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: \`${{ env.DOCKER_IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Short Description**: ${{ steps.get-desc.outputs.short }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Long Description**: Updated from docker/description/long.md" >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------------------------------
  # Job 10: Deployment Test
  # --------------------------------------------------------------------------
  deployment-test:
    name: Deployment Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [version, docker-publish]
    if: |
      always() &&
      needs.version.result == 'success' &&
      needs.docker-publish.result == 'success'
    steps:
      - name: 🧪 Test Docker Hub image
        run: |
          echo "Pulling image from Docker Hub..."
          docker pull ${{ env.DOCKER_IMAGE_NAME }}:${{ needs.version.outputs.docker_version }}
          
          echo "Testing image..."
          docker run --rm \
            -e VERSION=${{ needs.version.outputs.version }} \
            ${{ env.DOCKER_IMAGE_NAME }}:${{ needs.version.outputs.docker_version }} \
            node --version
          
          echo "✅ Docker Hub image is working"

      - name: 🧪 Test GHCR image
        run: |
          echo "Pulling image from GHCR..."
          # Extract repo name without Docker Hub username prefix
          REPO_NAME="${{ env.DOCKER_IMAGE_NAME }}"
          REPO_NAME="${REPO_NAME##*/}"
          docker pull ghcr.io/${{ github.repository_owner }}/${REPO_NAME}:${{ needs.version.outputs.docker_version }}
          
          echo "Testing image..."
          docker run --rm \
            -e VERSION=${{ needs.version.outputs.version }} \
            ghcr.io/${{ github.repository_owner }}/${REPO_NAME}:${{ needs.version.outputs.docker_version }} \
            node --version
          
          echo "✅ GHCR image is working"

      - name: 📋 Deployment test summary
        run: |
          echo "### ✅ Deployment Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Hub**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **GHCR**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------------------------------
  # Job 11: Create GitHub Release
  # --------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [version, docker-publish, npm-publish, security-scan, docker-hub-description, deployment-test]
    # Tag-gated for the same reason as npm-publish (see #153): tag is the
    # canonical release identity. Without this gate, after npm-publish became
    # tag-gated, main-push's npm-publish=skipped would no longer block release,
    # so release would start running from both main-push and tag-push for every
    # release. softprops/action-gh-release is idempotent (upserts by tag) but
    # relying on that is incidental rather than designed.
    if: |
      always() &&
      needs.version.outputs.is_release == 'true' &&
      needs.docker-publish.result == 'success' &&
      (needs.npm-publish.result == 'success' || needs.npm-publish.result == 'skipped') &&
      (needs.security-scan.result == 'success' || needs.security-scan.result == 'skipped') &&
      (needs.docker-hub-description.result == 'success' || needs.docker-hub-description.result == 'skipped') &&
      (needs.deployment-test.result == 'success' || needs.deployment-test.result == 'skipped') &&
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to ${{ needs.version.outputs.version }}"
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            echo "No previous tag found, showing recent commits"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -n 20)
          fi
          
          # Save changelog to file
          echo "$CHANGELOG" > changelog.txt
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Release v${{ needs.version.outputs.version }}
          body: |
            ## 🎉 Release v${{ needs.version.outputs.version }}
            
            ### 📦 Docker Images
            
            ```bash
            # Docker Hub
            docker pull ${{ env.DOCKER_IMAGE_NAME }}:${{ needs.version.outputs.docker_version }}
            
            # GitHub Container Registry
            docker pull ghcr.io/${{ github.repository_owner }}/actual-mcp-server:${{ needs.version.outputs.docker_version }}
            ```
            
            ### 📝 Changelog
            
            ${{ steps.changelog.outputs.changelog }}
            
            ### 🔒 Security
            
            This release has been scanned for vulnerabilities. Check the Security tab for details.
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Release summary
        run: |
          echo "### 🎉 Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`v${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Published" >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------------------------------
  # Final Summary
  # --------------------------------------------------------------------------
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [version, lint, test, docker-e2e, validate-short-description,
            docker-build, docker-publish, npm-publish, security-scan, deployment-test, release]
    if: always()
    steps:
      - name: 📊 Generate pipeline summary
        run: |
          echo "## 🚀 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version Generation | ${{ needs.version.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker E2E | ${{ needs.docker-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validate Description | ${{ needs.validate-short-description.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Publish | ${{ needs.docker-publish.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm Publish | ${{ needs.npm-publish.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployment Test | ${{ needs.deployment-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | ${{ needs.release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: \`${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

# ============================================================================
# Required Secrets:
# - DOCKERHUB_USER: Docker Hub username
# - DOCKERHUB_TOKEN: Docker Hub access token
# - NPM_TOKEN: NOT needed — npm publishing uses Trusted Publishers (OIDC, id-token: write)
# - GITHUB_TOKEN: Automatically provided by GitHub Actions
# ============================================================================

