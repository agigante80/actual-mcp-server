name: Dependency Update & Auto-Release

# -----------------------------------------------------------------------------
# Single self-contained workflow that handles the full dependency update cycle:
#
#   1. Check whether @actual-app/api has a new version
#   2. Create a working branch and install the new version
#   3. TypeScript build  (lint)
#   4. Unit tests
#   5. Docker E2E tests   (full suite)
#   6.  ↳ only if ALL above are green:
#          - bump patch version & update docs
#          - merge the working branch to main (fast-forward, tags included)
#          - delete the temporary branch
#          - create a GitHub Release
#
# Because this is a single sequential job, GitHub automatically stops at the
# first failing step: no version bump, no merge, no release if CI is red.
# No PR or auto-merge machinery is needed.
# -----------------------------------------------------------------------------

on:
  schedule:
    # Run daily at 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  pull-requests: write
  actions: read      # the publish guard reads ci-cd run status via gh (#261 fix 5)

jobs:
  update-test-release:
    name: Update • Lint • Test • Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      # -----------------------------------------------------------------------
      # 1. Setup
      # -----------------------------------------------------------------------
      - name: Generate GitHub App token
        id: token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # The App token (not GITHUB_TOKEN) authenticates the checkout, so every
      # later push is made by the App bot and triggers downstream workflows.
      # GITHUB_TOKEN pushes never fire ci-cd.yml, which is how v0.7.12 shipped
      # with no Docker image (#261 fix 2).
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0          # full history needed for merge + tagging
          token: ${{ steps.token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # -----------------------------------------------------------------------
      # 2. Version check: bail out early if already up to date
      # -----------------------------------------------------------------------
      - name: Check for new @actual-app/api version
        id: versions
        run: |
          CURRENT=$(node -p "require('./package.json').dependencies['@actual-app/api']" | sed 's/[\^~]//g')
          LATEST=$(npm show @actual-app/api version)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST"   >> $GITHUB_OUTPUT
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "✅ Already on latest: $CURRENT: nothing to do"
          else
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "🔔 Update available: $CURRENT → $LATEST"
          fi

      # -----------------------------------------------------------------------
      # 3. Create working branch, install new version, commit
      # -----------------------------------------------------------------------
      - name: Create branch and update dependency
        if: steps.versions.outputs.update_needed == 'true'
        env:
          LATEST: ${{ steps.versions.outputs.latest }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          BRANCH="deps/actual-api-${LATEST}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

          # Install new version (updates package.json + package-lock.json + node_modules)
          npm install @actual-app/api@^${LATEST}

          # Update API version string in docs (best-effort, || true avoids failure
          # if a pattern has already been updated or doesn't exist)
          sed -i "s/@actual-app\/api \^[0-9.]*/@actual-app\/api ^${LATEST}/" README.md || true

          git add -A
          git commit -m "chore(deps): upgrade @actual-app/api to ${LATEST}"
          echo "✅ Working branch '$BRANCH' created and committed"

      # -----------------------------------------------------------------------
      # 4. Lint: TypeScript compilation
      # -----------------------------------------------------------------------
      - name: 🔍 TypeScript build
        if: steps.versions.outputs.update_needed == 'true'
        run: npm run build

      # -----------------------------------------------------------------------
      # 5. Lint: Tool coverage check
      # -----------------------------------------------------------------------
      - name: 🔍 Check tool coverage
        if: steps.versions.outputs.update_needed == 'true'
        run: npm run check:coverage

      # -----------------------------------------------------------------------
      # 6. Unit tests
      # -----------------------------------------------------------------------
      - name: 🧪 Run unit tests
        if: steps.versions.outputs.update_needed == 'true'
        env:
          ACTUAL_SERVER_URL: http://localhost:5006
          ACTUAL_PASSWORD: dummy-password-for-tests
          ACTUAL_BUDGET_SYNC_ID: 00000000-0000-0000-0000-000000000000
        run: npm run test:unit-js

      # -----------------------------------------------------------------------
      # 7. Docker E2E tests (full suite)
      # -----------------------------------------------------------------------
      - name: 🎭 Install Playwright browsers
        if: steps.versions.outputs.update_needed == 'true'
        run: npx playwright install --with-deps

      - name: 🐳 Docker E2E tests (full suite)
        if: steps.versions.outputs.update_needed == 'true'
        run: npm run test:e2e:docker:full

      - name: 🧹 Cleanup Docker containers
        if: steps.versions.outputs.update_needed == 'true' && always()
        run: docker compose -f docker-compose.test.yaml down -v --remove-orphans

      # -----------------------------------------------------------------------
      # 8. All green: bump version and commit
      # -----------------------------------------------------------------------
      - name: 🔢 Bump patch version
        if: steps.versions.outputs.update_needed == 'true'
        id: bump
        run: |
          OLD=$(node -p "require('./package.json').version")
          npm run version:bump -- patch
          # Resync the lockfile: version-bump.js does not touch package-lock.json,
          # and a stale lock makes npm ci fail at the release commit (#261 fix 1).
          npm install --package-lock-only
          NEW=$(node -p "require('./package.json').version")
          # Canonical tool count via scripts/tool-count.mjs (#193): never re-derive
          # it with a private grep that can drift from IMPLEMENTED_TOOLS.
          TOOL_COUNT=$(node -e "import('./scripts/tool-count.mjs').then(m => console.log(m.getCanonicalCount()))")
          echo "old_version=$OLD" >> $GITHUB_OUTPUT
          echo "new_version=$NEW" >> $GITHUB_OUTPUT
          echo "tool_count=$TOOL_COUNT" >> $GITHUB_OUTPUT
          git add -A
          git commit -m "chore(release): bump version to ${NEW}"
          echo "✅ Version bumped to ${NEW} (lockfile resynced; ${TOOL_COUNT} tools)"

      # -----------------------------------------------------------------------
      # 9. Merge working branch → main, tag, push, clean up branch
      # -----------------------------------------------------------------------
      - name: 🚀 Merge to main and push tag
        if: steps.versions.outputs.update_needed == 'true'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          LATEST: ${{ steps.versions.outputs.latest }}
        run: |
          # Checkout is authenticated with the App token (#261 fix 2), so these
          # pushes are made by the App bot and trigger downstream workflows
          # (GITHUB_TOKEN pushes would not). Guarded by
          # tests/unit/workflow_release_guards.test.js invariants (a) and (b).

          # Push the branch first so the tag is reachable from origin
          git push origin "${BRANCH}"

          # Fast-forward main to the tip of our working branch
          git checkout main
          git merge --ff-only "${BRANCH}"

          # Tag the release commit
          git tag -a "v${NEW_VERSION}" \
            -m "Release v${NEW_VERSION}: @actual-app/api ${LATEST}"

          git push origin main
          git push origin "v${NEW_VERSION}"

          # Remove the temporary working branch
          git push origin --delete "${BRANCH}"
          echo "✅ Merged, tagged v${NEW_VERSION}, branch deleted"

      # -----------------------------------------------------------------------
      # 10. Verify the tag push actually triggered the publish pipeline (#261)
      #     ci-cd.yml on the tag is what builds and publishes the Docker image.
      #     If it never fires (the v0.7.12 failure mode) or fails, this job must
      #     fail loudly and the GitHub Release below must NOT be created. The
      #     tag itself is already pushed and immutable; on guard failure the
      #     remediation is manual (rerun ci-cd or cut the next patch).
      # -----------------------------------------------------------------------
      - name: 🔎 Verify ci-cd pipeline triggered and succeeded
        if: steps.versions.outputs.update_needed == 'true'
        timeout-minutes: 30
        env:
          # github.token (not the App token): the guard only READS run status,
          # needs the actions:read permission granted above, and cannot expire
          # mid-watch the way the 1-hour App installation token could.
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          # Discovery waits on runner-queue latency, not execution: be generous
          # (40 polls x 15s = 10 minutes). `|| true` keeps a transient gh/API
          # error from aborting the loop under errexit; it retries instead.
          echo "Waiting for the CI/CD Pipeline run on tag v${NEW_VERSION} (poll 15s, timeout 10m)..."
          for _ in $(seq 1 40); do
            RUN_ID=$(gh run list --workflow ci-cd.yml --branch "v${NEW_VERSION}" --event push --limit 1 --json databaseId --jq '.[0].databaseId // empty' || true)
            if [ -n "$RUN_ID" ]; then break; fi
            sleep 15
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::ci-cd.yml never triggered on tag v${NEW_VERSION}. The push likely authenticated as GITHUB_TOKEN instead of the App (see #261); failing before the GitHub Release is created."
            exit 1
          fi
          echo "Found ci-cd run ${RUN_ID}; watching it to completion..."
          gh run watch "$RUN_ID" --exit-status --interval 30
          echo "✅ Publish pipeline succeeded; safe to create the GitHub Release."

      # -----------------------------------------------------------------------
      # 11. Create GitHub Release (only reached after the publish guard passed)
      # -----------------------------------------------------------------------
      - name: 📦 Create GitHub Release
        if: steps.versions.outputs.update_needed == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          body: |
            ## 🤖 Automated Dependency Update Release

            This release was automatically created after all CI checks passed on
            a temporary working branch: lint, unit tests, and Docker E2E tests
            (full suite) were green before anything was merged to `main`.

            ### Changes
            - ⬆️ Upgraded `@actual-app/api` to version `${{ steps.versions.outputs.latest }}`
            - 🔢 Version bumped from `${{ steps.bump.outputs.old_version }}` to `${{ steps.bump.outputs.new_version }}`

            ### What's Updated
            - Actual Budget API integration updated to latest version
            - All ${{ steps.bump.outputs.tool_count }} MCP tools validated with the new API version
            - Docker images rebuilt and published by the tag pipeline (verified before this release was created)

            ### CI Checks Passed ✅
            - TypeScript compilation (no type errors)
            - Tool coverage check (all ${{ steps.bump.outputs.tool_count }} tools registered)
            - Unit + schema tests
            - Docker E2E full suite
            - Publish pipeline (ci-cd.yml) confirmed triggered and green on the tag

            ---

            **🚀 Docker Images Published**
            - `agigante80/actual-mcp-server:${{ steps.bump.outputs.new_version }}`
            - `agigante80/actual-mcp-server:latest`

            **📦 npm Package**
            - [@actual-app/api@${{ steps.versions.outputs.latest }}](https://www.npmjs.com/package/@actual-app/api/v/${{ steps.versions.outputs.latest }})

            ---
            🤖 Automated release: no manual intervention required
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 12. Keep develop in sync with the auto-released main (#145)
      #     Runs AFTER the guard and Release so a sync problem can never block
      #     the publish verification or the Release itself (#261 fix 3). The
      #     old brace-group-or-fallback construct here suppressed errexit, so a
      #     failed ff-merge logged a false success and skipped the sync PR.
      # -----------------------------------------------------------------------
      - name: 🔄 Sync develop with released main
        if: steps.versions.outputs.update_needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git fetch origin develop:develop
          git checkout develop
          if git merge --ff-only main && git push origin develop; then
            echo "✅ Develop fast-forwarded to v${NEW_VERSION}"
          else
            # Assigned on its own line so a transient gh failure hits errexit
            # loudly instead of being swallowed inside a test condition, which
            # would falsely report an existing sync PR (#261 fix 3).
            OPEN_SYNC_PRS=$(gh pr list --base develop --head main --state open --json number --jq 'length')
            if [ "$OPEN_SYNC_PRS" != "0" ]; then
              echo "⚠ Develop has diverged; a main to develop sync PR is already open, nothing to do"
            elif gh pr create --base develop --head main \
              --title "chore: sync develop with auto-release main (v${NEW_VERSION})" \
              --body "Automated PR from dependency-update.yml. Develop has diverged from main; merge could not be fast-forward. Resolve any conflicts and merge to keep develop in sync."; then
              echo "⚠ Develop has diverged; opened a sync PR"
            else
              echo "::error::develop sync failed AND no sync PR exists or could be created; manual merge from main to develop is required (#261 fix 3)"
              exit 1
            fi
          fi

      # -----------------------------------------------------------------------
      # 13. Summary
      # -----------------------------------------------------------------------
      - name: ✅ Summary (released)
        if: steps.versions.outputs.update_needed == 'true'
        run: |
          echo "### 🎉 Release Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| @actual-app/api | \`${{ steps.versions.outputs.current }}\` → \`${{ steps.versions.outputs.latest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.bump.outputs.new_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | [v${{ steps.bump.outputs.new_version }}](https://github.com/${{ github.repository }}/releases/tag/v${{ steps.bump.outputs.new_version }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Lint · Unit tests · Docker E2E: all green before merge" >> $GITHUB_STEP_SUMMARY

      - name: ⏭️ Summary (no update)
        if: steps.versions.outputs.update_needed == 'false'
        run: |
          echo "### ✅ Already Up to Date" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Current version \`${{ steps.versions.outputs.current }}\` is the latest: nothing to do." >> $GITHUB_STEP_SUMMARY

