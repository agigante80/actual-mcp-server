name: Dependency Update Check

on:
  schedule:
    # Run daily at 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    name: Check for Actual API Updates
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Generate token from GitHub App
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Get current version
        id: current
        run: |
          CURRENT=$(node -p "require('./package.json').dependencies['@actual-app/api']" | sed 's/[\^~]//g')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current @actual-app/api version: $CURRENT"
          
      - name: Check latest version
        id: latest
        run: |
          LATEST=$(npm show @actual-app/api version)
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest @actual-app/api version: $LATEST"
          
      - name: Compare versions
        id: compare
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LATEST="${{ steps.latest.outputs.version }}"
          
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "🔔 Update available: $CURRENT → $LATEST"
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "✅ Already on latest version: $CURRENT"
          fi
          
      - name: Update package.json
        if: steps.compare.outputs.update_needed == 'true'
        run: |
          LATEST="${{ steps.latest.outputs.version }}"
          npm install --package-lock-only @actual-app/api@^$LATEST
          
      - name: Update README.md and documentation
        if: steps.compare.outputs.update_needed == 'true'
        run: |
          LATEST="${{ steps.latest.outputs.version }}"
          
          # Update README.md Tech Stack section
          sed -i "s/@actual-app\/api \^[0-9.]*/@actual-app\/api ^$LATEST/" README.md
          echo "✅ Updated README.md"
          
          # Update docs/PROJECT_OVERVIEW.md - dependency table
          sed -i "s/\`@actual-app\/api\` | \^[0-9.]*/\`@actual-app\/api\` | ^$LATEST/" docs/PROJECT_OVERVIEW.md
          echo "✅ Updated docs/PROJECT_OVERVIEW.md (table)"
          
          # Update docs/PROJECT_OVERVIEW.md - technical constraints
          sed -i "s/Requires compatible API version ([0-9.]*+)/Requires compatible API version ($LATEST+)/" docs/PROJECT_OVERVIEW.md
          echo "✅ Updated docs/PROJECT_OVERVIEW.md (constraints)"
          
          # Update docs/ARCHITECTURE.md - core dependencies
          sed -i "s/@actual-app\/api\*\* (\^[0-9.]*)/@actual-app\/api** (^$LATEST)/" docs/ARCHITECTURE.md
          echo "✅ Updated docs/ARCHITECTURE.md"
          
          echo "📝 All documentation updated to @actual-app/api ^$LATEST"
          
      - name: Get changelog
        if: steps.compare.outputs.update_needed == 'true'
        id: changelog
        run: |
          LATEST="${{ steps.latest.outputs.version }}"
          # Get package info including recent versions
          CHANGELOG=$(npm show @actual-app/api@$LATEST --json | jq -r '.version + ": Released " + .time.modified')
          echo "info=$CHANGELOG" >> $GITHUB_OUTPUT
          
      - name: Create Pull Request
        if: steps.compare.outputs.update_needed == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: "chore(deps): upgrade @actual-app/api to ${{ steps.latest.outputs.version }}"
          branch: deps/actual-api-${{ steps.latest.outputs.version }}
          delete-branch: true
          title: "⬆️ Upgrade @actual-app/api to ${{ steps.latest.outputs.version }}"
          body: |
            ## 🔄 Dependency Update
            
            Automated update of `@actual-app/api` dependency.
            
            ### Changes
            - **Current version:** `${{ steps.current.outputs.version }}`
            - **New version:** `${{ steps.latest.outputs.version }}`
            - **Package:** [@actual-app/api on npm](https://www.npmjs.com/package/@actual-app/api)
            
            ### Files Updated
            - ✅ `package.json` - Dependency version
            - ✅ `package-lock.json` - Lock file
            - ✅ `README.md` - Tech Stack section
            - ✅ `docs/PROJECT_OVERVIEW.md` - Dependency table & constraints
            - ✅ `docs/ARCHITECTURE.md` - Core dependencies
            
            ### Release Info
            ${{ steps.changelog.outputs.info }}
            
            ### 🤖 Fully Automated Process
            This PR will:
            1. ✅ Run all CI/CD tests automatically
            2. ✅ Auto-merge when all checks pass
            3. ✅ Auto-bump patch version
            4. ✅ Auto-create GitHub release
            5. ✅ Auto-publish Docker images
            
            **No manual intervention needed** - the automation handles everything!
            
            ---
            🤖 This PR was automatically created by the dependency update workflow.
          labels: |
            dependencies
            automated
            actual-api
          reviewers: agigante80
      
      - name: Enable auto-merge
        if: steps.compare.outputs.update_needed == 'true' && steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} \
            --auto --squash --delete-branch
          echo "✅ Auto-merge enabled - will merge when CI passes"
          
      - name: Summary
        if: steps.compare.outputs.update_needed == 'true'
        run: |
          echo "### 🤖 Fully Automated Update Initiated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **From:** ${{ steps.current.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **To:** ${{ steps.latest.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR:** #${{ steps.create-pr.outputs.pull-request-number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Automation Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "1. ⏳ CI/CD tests running..." >> $GITHUB_STEP_SUMMARY
          echo "2. ⏳ Will auto-merge when tests pass" >> $GITHUB_STEP_SUMMARY
          echo "3. ⏳ Will auto-bump patch version" >> $GITHUB_STEP_SUMMARY
          echo "4. ⏳ Will auto-create GitHub release" >> $GITHUB_STEP_SUMMARY
          echo "5. ⏳ Will auto-publish Docker images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**No manual intervention needed!** 🎉" >> $GITHUB_STEP_SUMMARY
          
      - name: No update needed
        if: steps.compare.outputs.update_needed == 'false'
        run: |
          echo "### ✅ Already Up to Date" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Current version ${{ steps.current.outputs.version }} is the latest." >> $GITHUB_STEP_SUMMARY
